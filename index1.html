<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0d0d0d; /* pure black */
    font-family: Arial, sans-serif;
  }

  .calculator {
    width: 320px;
    background: #ffffff; /* white card */
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  #display {
    width: 100%;
    height: 70px;
    font-size: 28px;
    text-align: right;
    border: none;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 15px;
    background: #f2f2f2;
    color: #000;
    outline: none;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #000;   /* black buttons */
    color: #fff;
    transition: 0.2s;
  }

  button:hover {
    background: #333;
    transform: scale(1.05);
  }

  .equal {
    background: #ffffff;
    color: #000;
    border: 2px solid #000;
  }

  .clear {
    background: #000;
    color: #ff4d4d;
  }
</style>
