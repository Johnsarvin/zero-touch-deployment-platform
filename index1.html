<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    font-family:Arial;
    margin:0;
}

.calculator{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

#display{
    width:100%;
    height:60px;
    font-size:24px;
    text-align:right;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    padding:5px;
    background:#fff;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:18px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* number buttons */
.num{
    background:#e2e8f0;
}

/* operator buttons */
.op{
    background:#3b82f6;
    color:white;
}

/* equal button */
.eq{
    background:#22c55e;
    color:white;
}

/* clear button */
.clr{
    background:#ef4444;
    color:white;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

    <button class="clr" onclick="clearDisplay()">C</button>
    <button class="op" onclick="append('/')">/</button>
    <button class="op" onclick="append('*')">*</button>
    <button class="op" onclick="append('-')">-</button>

    <button class="num" onclick="append('7')">7</button>
    <button class="num" onclick="append('8')">8</button>
    <button class="num" onclick="append('9')">9</button>
    <button class="op" onclick="append('+')">+</button>

    <button class="num" onclick="append('4')">4</button>
    <button class="num" onclick="append('5')">5</button>
    <button class="num" onclick="append('6')">6</button>
    <button class="eq" onclick="calculate()">=</button>

    <button class="num" onclick="append('1')">1</button>
    <button class="num" onclick="append('2')">2</button>
    <button class="num" onclick="append('3')">3</button>
    <button class="num" onclick="append('.')">.</button>

    <button class="num" onclick="append('0')" style="grid-column:span 4;">0</button>

</div>

</div>

<script>

function append(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }catch{
        alert("Invalid Input");
    }
}

</script>

</body>
</html>
