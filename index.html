<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Calculator Pro</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, Arial;
  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #ff00cc);
  background-size: 400% 400%;
  animation: bg 12s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.calculator {
  width: 340px;
  padding: 20px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

#display {
  width: 100%;
  height: 70px;
  font-size: 30px;
  text-align: right;
  padding: 10px;
  border: none;
  border-radius: 14px;
  margin-bottom: 15px;
  background: rgba(0,0,0,0.5);
  color: #00ffe5;
  outline: none;
  box-shadow: inset 0 0 12px rgba(0,255,229,0.4);
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  padding: 18px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  color: white;
  background: rgba(255,255,255,0.12);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.07);
  box-shadow: 0 0 14px rgba(0,255,255,0.6);
}

.equal {
  background: linear-gradient(45deg, #00c9a7, #00ffcc);
  color: black;
  font-weight: bold;
}

.clear {
  background: linear-gradient(45deg, #ff4d4d, #ff0066);
}

.op {
  color: #ffccff;
}
</style>
</head>

<body>

<div class="calculator">
  <input id="display" disabled />

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="op" onclick="append('/')">/</button>
    <button class="op" onclick="append('*')">*</button>
    <button onclick="deleteLast()">⌫</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="op" onclick="append('-')">-</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="op" onclick="append('+')">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="append('0')" style="grid-column: span 2;">0</button>
    <button onclick="append('.')">.</button>
  </div>
</div>

<script>
const display = document.getElementById("display");

function append(v) {
  const last = display.value.slice(-1);
  const ops = "+-*/";

  // prevent duplicate operators
  if (ops.includes(last) && ops.includes(v)) return;

  display.value += v;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    if (!display.value) return;

    // safer evaluation using Function but with validation
    if (/[^0-9+\-*/.]/.test(display.value)) {
      display.value = "Error";
      return;
    }

    display.value = new Function("return " + display.value)();
  } catch {
    display.value = "Error";
  }
}

// keyboard support
document.addEventListener("keydown", (e) => {
  const keys = "0123456789+-*/.";

  if (keys.includes(e.key)) append(e.key);
  else if (e.key === "Enter") calculate();
  else if (e.key === "Backspace") deleteLast();
  else if (e.key.toLowerCase() === "c") clearDisplay();
});
</script>

</body>
</html>
