<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Calculator</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #ff00cc);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.calculator {
  width: 340px;
  padding: 22px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

#display {
  width: 100%;
  height: 75px;
  font-size: 32px;
  text-align: right;
  padding: 10px;
  border: none;
  border-radius: 14px;
  margin-bottom: 15px;
  background: rgba(0,0,0,0.4);
  color: #00ffe5;
  outline: none;
  box-shadow: inset 0 0 10px rgba(0,255,229,0.3);
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

button {
  padding: 18px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  color: white;
  background: rgba(255,255,255,0.12);
  transition: 0.2s;
  box-shadow: 0 0 8px rgba(255,255,255,0.1);
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 15px rgba(0,255,255,0.6);
  background: rgba(255,255,255,0.25);
}

.equal {
  background: linear-gradient(45deg, #00c9a7, #00ffcc);
  color: black;
  font-weight: bold;
}

.clear {
  background: linear-gradient(45deg, #ff4d4d, #ff0066);
}

button:nth-child(4n) {
  background: rgba(255, 0, 204, 0.25);
}
</style>
</head>

<body>

<div class="calculator">
  <input id="display" disabled />

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">*</button>
    <button onclick="deleteLast()">⌫</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="append('0')" style="grid-column: span 2;">0</button>
    <button onclick="append('.')">.</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

function append(v) {
  display.value += v;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    display.value = Function("return " + display.value)();
  } catch {
    display.value = "Error";
  }
}

document.addEventListener("keydown", (e) => {
  if (!isNaN(e.key) || "+-*/.".includes(e.key)) append(e.key);
  else if (e.key === "Enter") calculate();
  else if (e.key === "Backspace") deleteLast();
  else if (e.key.toLowerCase() === "c") clearDisplay();
});
</script>

</body>
</html>
